services:
  db:
    image: postgres:17-alpine
    container_name: novabyte-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - novabyte_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - novabyte-network

  backend:
    image: ghcr.io/${GHCR_OWNER}/novabyte-backend:${IMAGE_TAG:-latest}
    container_name: novabyte-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      ENVIRONMENT: production
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    networks:
      - novabyte-network

  frontend:
    image: ghcr.io/${GHCR_OWNER}/novabyte-frontend:${IMAGE_TAG:-latest}
    container_name: novabyte-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8081}:80"
    networks:
      - novabyte-network

volumes:
  novabyte_postgres_data:

networks:
  novabyte-network:
    driver: bridge
