name: NovaByte CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: sqlite:///./ci.db
      ADMIN_API_KEY: test-key
      ENVIRONMENT: test
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Instalar dependencias
        run: pip install -r requirements-dev.txt

      - name: Ejecutar pruebas
        run: pytest -q

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm install -g npm@latest && npm ci

      - name: Compilar frontend
        run: npm run build

  publish-images:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [backend-tests, frontend-build]
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Iniciar sesión en GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Construir y publicar backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/novabyte-backend:latest
            ghcr.io/${{ github.repository_owner }}/novabyte-backend:${{ github.sha }}

      - name: Construir y publicar frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/novabyte-frontend:latest
            ghcr.io/${{ github.repository_owner }}/novabyte-frontend:${{ github.sha }}

  deploy-vps:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: publish-images
    runs-on: ubuntu-latest
    steps:
      - name: Actualizar stack en Hetzner
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          script: |
            if [ ! -d /opt/novabyte/.git ]; then
              git clone https://github.com/${{ github.repository }}.git /opt/novabyte
            fi
            cd /opt/novabyte
            git fetch origin main
            git reset --hard origin/main
            chmod +x deploy.sh
            export GHCR_OWNER="${{ github.repository_owner }}"
            export GHCR_TOKEN="${{ secrets.GHCR_TOKEN }}"
            export IMAGE_TAG="latest"
            ./deploy.sh
